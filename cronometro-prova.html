<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Cronómetro" />
<title>Cronómetro de Prova</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=JetBrains+Mono:wght@500;700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #0B0D0C;
    --surface: #14171A;
    --surface2: #1C2023;
    --red: #C8102E;
    --red-dark: #8F0B21;
    --amber: #FFB000;
    --offwhite: #F2EFE9;
    --steel: #8B9296;
    --green: #3FB950;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    touch-action: manipulation;
    overscroll-behavior: none;
  }

  #app {
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* ---------- Header ---------- */
  .header {
    flex-shrink: 0;
    text-align: center;
    padding: 12px 16px 6px;
  }
  .title {
    color: var(--offwhite);
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 17px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: transparent;
    border: none;
    text-align: center;
    width: 100%;
    outline: none;
  }
  .status {
    color: var(--steel);
    font-size: 11px;
    letter-spacing: 0.08em;
    margin-top: 2px;
  }

  /* ---------- Clock ---------- */
  .clock-wrap {
    flex-shrink: 0;
    text-align: center;
    padding: 6px 0 2px;
  }
  .clock {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 15vw;
    line-height: 1;
    color: var(--steel);
    font-variant-numeric: tabular-nums;
  }
  .clock.running { color: var(--amber); }
  .count {
    color: var(--steel);
    font-size: 13px;
    margin-top: 6px;
    min-height: 16px;
  }

  /* ---------- Main tap zone ---------- */
  .zone {
    flex: 1;
    margin: 8px 12px;
    border-radius: 26px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.06s ease;
    min-height: 0;
  }
  .zone:active { transform: scale(0.985); }
  .zone.idle { background: var(--green); }
  .zone.running { background: var(--red); }

  .zone-title {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-align: center;
    padding: 0 20px;
  }
  .zone.idle .zone-title { color: #0B0D0C; font-size: 28px; }
  .zone.running .zone-title { color: var(--offwhite); font-size: 30px; }
  .zone-sub {
    color: rgba(242,239,233,0.72);
    font-size: 13px;
    margin-top: 12px;
    text-align: center;
    padding: 0 24px;
  }

  /* ---------- Flash ---------- */
  .flash {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: repeating-linear-gradient(-45deg, var(--offwhite) 0 14px, var(--bg) 14px 28px);
  }
  .flash.show { display: flex; animation: sweep 0.5s ease-out; }
  @keyframes sweep {
    0% { transform: translateX(-8%); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateX(8%); opacity: 0.9; }
  }
  .flash-card {
    background: rgba(11,13,12,0.88);
    border-radius: 20px;
    padding: 16px 26px;
    text-align: center;
    animation: pop 0.28s ease-out;
  }
  @keyframes pop {
    0% { transform: scale(0.7); }
    45% { transform: scale(1.06); }
    100% { transform: scale(1); }
  }
  .flash-rank {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.1em;
    color: var(--amber);
  }
  .flash-time {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 34px;
    color: var(--offwhite);
    margin-top: 2px;
  }

  /* ---------- Footer ---------- */
  .footer {
    flex-shrink: 0;
    display: flex;
    gap: 8px;
    padding: 4px 12px 14px;
  }
  .btn {
    flex: 1;
    padding: 14px 8px;
    border-radius: 13px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    color: var(--offwhite);
    background: var(--surface);
    transition: transform 0.06s ease, opacity 0.15s ease;
  }
  .btn:active { transform: scale(0.97); }
  .btn.secondary { background: var(--surface2); }
  .btn:disabled { opacity: 0.45; }

  /* ---------- Results overlay ---------- */
  .results {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 10;
    display: none;
    flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .results.show { display: flex; }
  .results-head {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
  }
  .results-head .back {
    color: var(--offwhite);
    background: none;
    border: none;
    font-size: 22px;
    width: 40px;
    text-align: left;
  }
  .results-head .h-title {
    color: var(--offwhite);
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .results-list {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0 12px;
    min-height: 0;
  }
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-radius: 10px;
  }
  .row:nth-child(odd) { background: var(--surface); }
  .row .rank {
    color: var(--steel);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }
  .row .time {
    color: var(--offwhite);
    font-size: 19px;
    font-family: 'JetBrains Mono', monospace;
    font-variant-numeric: tabular-nums;
  }
  .row .del {
    color: var(--red);
    background: none;
    border: none;
    font-size: 15px;
    padding: 4px 8px;
    margin-left: 8px;
  }
  .empty {
    color: var(--steel);
    text-align: center;
    margin-top: 44px;
    font-size: 14px;
  }
  .results-foot {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 12px 12px 16px;
  }
  .btn-primary {
    padding: 16px;
    border-radius: 13px;
    border: none;
    background: var(--amber);
    color: #0B0D0C;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.04em;
    transition: transform 0.06s ease, background 0.2s ease;
  }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary.copied { background: var(--green); }
  .btn-primary:disabled { opacity: 0.45; }
  .btn-danger {
    padding: 13px;
    border-radius: 13px;
    border: none;
    background: var(--surface);
    color: var(--steel);
    font-size: 14px;
    font-weight: 600;
  }
  .btn-danger.armed { background: var(--red-dark); color: var(--offwhite); }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <input class="title" id="title" value="Prova de Atletismo" maxlength="40" />
    <div class="status" id="status">PRONTO PARA INICIAR</div>
  </div>

  <div class="clock-wrap">
    <div class="clock" id="clock">0:00.00</div>
    <div class="count" id="count"></div>
  </div>

  <!-- The whole zone is the tap target -->
  <div class="zone idle" id="zone">
    <div class="zone-title" id="zoneTitle">INICIAR PROVA</div>
    <div class="zone-sub" id="zoneSub"></div>
    <div class="flash" id="flash">
      <div class="flash-card">
        <div class="flash-rank" id="flashRank"></div>
        <div class="flash-time" id="flashTime"></div>
      </div>
    </div>
  </div>

  <div class="footer">
    <button class="btn" id="undoBtn" disabled>Desfazer última</button>
    <button class="btn secondary" id="resultsBtn">Resultados (0)</button>
  </div>
</div>

<!-- Results overlay -->
<div class="results" id="results">
  <div class="results-head">
    <button class="back" id="backBtn">&larr;</button>
    <div class="h-title">Resultados</div>
    <div style="width:40px"></div>
  </div>
  <div class="results-list" id="list">
    <div class="empty">Ainda não há chegadas registadas.</div>
  </div>
  <div class="results-foot">
    <button class="btn-primary" id="copyBtn" disabled>COPIAR TEMPOS</button>
    <button class="btn-danger" id="resetBtn">Reiniciar prova</button>
  </div>
</div>

<script>
(function () {
  "use strict";

  // ---------- State ----------
  var phase = "idle";        // idle | running
  var startAt = 0;
  var times = [];            // elapsed ms per finisher
  var rafId = null;
  var flashTimer = null;
  var resetArmed = false;
  var resetTimer = null;

  // ---------- Elements ----------
  var el = {
    title: document.getElementById("title"),
    status: document.getElementById("status"),
    clock: document.getElementById("clock"),
    count: document.getElementById("count"),
    zone: document.getElementById("zone"),
    zoneTitle: document.getElementById("zoneTitle"),
    zoneSub: document.getElementById("zoneSub"),
    flash: document.getElementById("flash"),
    flashRank: document.getElementById("flashRank"),
    flashTime: document.getElementById("flashTime"),
    undoBtn: document.getElementById("undoBtn"),
    resultsBtn: document.getElementById("resultsBtn"),
    results: document.getElementById("results"),
    backBtn: document.getElementById("backBtn"),
    list: document.getElementById("list"),
    copyBtn: document.getElementById("copyBtn"),
    resetBtn: document.getElementById("resetBtn")
  };

  // ---------- Time formatting: mm:ss.cc ----------
  function fmt(ms) {
    if (ms < 0) ms = 0;
    var totalCenti = Math.floor(ms / 10);
    var cc = totalCenti % 100;
    var totalSec = Math.floor(totalCenti / 100);
    var ss = totalSec % 60;
    var mm = Math.floor(totalSec / 60);
    return mm + ":" + pad2(ss) + "." + pad2(cc);
  }
  function pad2(n) { return n < 10 ? "0" + n : "" + n; }

  // ---------- Clock loop ----------
  function tick() {
    if (phase !== "running") return;
    el.clock.textContent = fmt(now() - startAt);
    rafId = requestAnimationFrame(tick);
  }
  function now() { return performance.now(); }

  // ---------- Actions ----------
  function startRace() {
    startAt = now();
    times = [];
    phase = "running";
    el.zone.classList.remove("idle");
    el.zone.classList.add("running");
    el.zoneTitle.textContent = "REGISTAR CHEGADA";
    el.zoneSub.textContent = "toca em qualquer sítio do ecrã por cada atleta que chega à meta";
    el.status.textContent = "EM CURSO";
    el.clock.classList.add("running");
    updateFooter();
    if (rafId) cancelAnimationFrame(rafId);
    tick();
    haptic();
  }

  function recordFinish() {
    var elapsed = now() - startAt;
    times.push(elapsed);
    showFlash(times.length, elapsed);
    updateFooter();
    haptic();
  }

  function showFlash(rank, ms) {
    el.flashRank.textContent = rank + "\u00BA LUGAR";
    el.flashTime.textContent = fmt(ms);
    el.flash.classList.remove("show");
    // force reflow to restart animation
    void el.flash.offsetWidth;
    el.flash.classList.add("show");
    if (flashTimer) clearTimeout(flashTimer);
    flashTimer = setTimeout(function () {
      el.flash.classList.remove("show");
    }, 520);
  }

  function undo() {
    if (phase !== "running" || times.length === 0) return;
    times.pop();
    updateFooter();
    haptic();
  }

  function updateFooter() {
    el.undoBtn.disabled = !(phase === "running" && times.length > 0);
    el.resultsBtn.textContent = "Resultados (" + times.length + ")";
    el.count.textContent = times.length > 0
      ? times.length + (times.length === 1 ? " chegada" : " chegadas")
      : "";
  }

  // ---------- Results ----------
  function openResults() {
    renderList();
    el.results.classList.add("show");
  }
  function closeResults() {
    el.results.classList.remove("show");
    disarmReset();
  }
  function renderList() {
    if (times.length === 0) {
      el.list.innerHTML = '<div class="empty">Ainda não há chegadas registadas.</div>';
      el.copyBtn.disabled = true;
      return;
    }
    el.copyBtn.disabled = false;
    var html = "";
    for (var i = 0; i < times.length; i++) {
      html +=
        '<div class="row">' +
          '<span class="rank">' + (i + 1) + '\u00BA</span>' +
          '<span class="time">' + fmt(times[i]) + '</span>' +
          '<button class="del" data-i="' + i + '">apagar</button>' +
        '</div>';
    }
    el.list.innerHTML = html;
    var dels = el.list.querySelectorAll(".del");
    for (var j = 0; j < dels.length; j++) {
      dels[j].addEventListener("click", function (e) {
        var idx = parseInt(e.currentTarget.getAttribute("data-i"), 10);
        times.splice(idx, 1);
        renderList();
        updateFooter();
        haptic();
      });
    }
  }

  // ---------- Copy: exact mm:ss.cc, one per line ----------
  function buildText() {
    var lines = [];
    for (var i = 0; i < times.length; i++) lines.push(fmt(times[i]));
    return lines.join("\n");
  }

  function copyTimes() {
    if (times.length === 0) return;
    var text = buildText();
    var done = function () {
      el.copyBtn.classList.add("copied");
      el.copyBtn.textContent = "COPIADO \u2713";
      setTimeout(function () {
        el.copyBtn.classList.remove("copied");
        el.copyBtn.textContent = "COPIAR TEMPOS";
      }, 1500);
      haptic();
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, function () { fallbackCopy(text, done); });
    } else {
      fallbackCopy(text, done);
    }
  }

  function fallbackCopy(text, done) {
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.top = "0";
    ta.style.left = "0";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.focus();
    ta.setSelectionRange(0, text.length);
    try { document.execCommand("copy"); done(); }
    catch (e) { alert("Não foi possível copiar automaticamente. Texto:\n\n" + text); }
    document.body.removeChild(ta);
  }

  // ---------- Reset ----------
  function armReset() {
    if (!resetArmed) {
      resetArmed = true;
      el.resetBtn.classList.add("armed");
      el.resetBtn.textContent = "Confirmar: apagar tudo";
      if (resetTimer) clearTimeout(resetTimer);
      resetTimer = setTimeout(disarmReset, 3000);
    } else {
      disarmReset();
      doReset();
    }
  }
  function disarmReset() {
    resetArmed = false;
    if (resetTimer) clearTimeout(resetTimer);
    el.resetBtn.classList.remove("armed");
    el.resetBtn.textContent = "Reiniciar prova";
  }
  function doReset() {
    phase = "idle";
    times = [];
    if (rafId) cancelAnimationFrame(rafId);
    el.zone.classList.remove("running");
    el.zone.classList.add("idle");
    el.zoneTitle.textContent = "INICIAR PROVA";
    el.zoneSub.textContent = "";
    el.status.textContent = "PRONTO PARA INICIAR";
    el.clock.classList.remove("running");
    el.clock.textContent = "0:00.00";
    updateFooter();
    closeResults();
  }

  // ---------- Haptics (best-effort) ----------
  function haptic() {
    if (navigator.vibrate) { try { navigator.vibrate(12); } catch (e) {} }
  }

  // ---------- Zone tap handling ----------
  // Use pointerdown for lowest latency; guard against double-firing.
  var lastTap = 0;
  function onZone(e) {
    // Ignore taps that land on the title input etc. (zone has no children that matter)
    var t = now();
    if (t - lastTap < 60) return; // debounce accidental double events
    lastTap = t;
    if (phase === "idle") startRace();
    else recordFinish();
  }
  if (window.PointerEvent) {
    el.zone.addEventListener("pointerdown", onZone);
  } else {
    el.zone.addEventListener("touchstart", function (e) { e.preventDefault(); onZone(e); }, { passive: false });
    el.zone.addEventListener("mousedown", onZone);
  }

  // Prevent the title input from being edited mid-race
  el.title.addEventListener("focus", function () {
    if (phase === "running") el.title.blur();
  });

  // ---------- Wire buttons ----------
  el.undoBtn.addEventListener("click", undo);
  el.resultsBtn.addEventListener("click", openResults);
  el.backBtn.addEventListener("click", closeResults);
  el.copyBtn.addEventListener("click", copyTimes);
  el.resetBtn.addEventListener("click", armReset);

  // Prevent pull-to-refresh / rubber-band on the main screen
  document.addEventListener("touchmove", function (e) {
    if (!el.results.classList.contains("show")) e.preventDefault();
  }, { passive: false });

  updateFooter();
})();
</script>
</body>
</html>
